<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ملفي الشخصي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* الكارد */
.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 40px rgba(56,189,248,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 60px rgba(56,189,248,0.4);
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 2px solid #38bdf8;
}

h1 {
    color: #fff;
    margin-bottom: 10px;
}

p {
    color: #cbd5e1;
    margin-bottom: 20px;
}

/* الأزرار */
.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    font-weight: bold;
}

/* تيك توك */
.tiktok {
    background: linear-gradient(45deg, #ff0050, #000);
}

.tiktok:hover {
    box-shadow: 0 0 20px #ff0050;
}

/* ديسكورد */
.discord {
    background: linear-gradient(45deg, #5865F2, #404eed);
}

.discord:hover {
    box-shadow: 0 0 20px #5865F2;
}

/* زر نسخ */
.copy {
    background: #0ea5e9;
    cursor: pointer;
}

.copy:hover {
    box-shadow: 0 0 20px #0ea5e9;
}
</style>
</head>
